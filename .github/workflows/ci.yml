name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: quality-py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.9"
          - "3.11"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Icarus Verilog
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff format check
        run: python -m ruff format --check .

      - name: Ruff lint
        run: python -m ruff check .

      - name: Pytest
        run: python -m pytest -q

      - name: Mock and RTL smoke runs
        shell: bash
        run: |
          set -euo pipefail
          python -m dv_regression_lab run examples/soc_smoke.yaml
          python -m dv_regression_lab run examples/rtl_smoke_iverilog.yaml
          python -m dv_regression_lab list-runs

          latest_run_id="$(python - <<'PY'
from pathlib import Path
from dv_regression_lab.store import RunStore

store = RunStore(Path(".data"))
runs = store.list_runs(limit=10)
print(runs[0].run_id)
PY
          )"

          python -m dv_regression_lab review-pack "$latest_run_id"
          python -m dv_regression_lab suite-trend rtl_smoke_iverilog

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dv-regression-lab-artifacts-py${{ matrix.python-version }}
          path: |
            .data/runs
            .data/artifacts
          if-no-files-found: ignore

